<header>
  <div class="header__name">
    <a href="#"> Cudo-shop </a>
  </div>
  <div class="header__search">
    <svg class="header-search"></svg>
    <input type="search" name="search" id="search" placeholder="Search..." />
  </div>
  <div class="header__buttons">
    <app-button label="Login" (buttonClicked)="buttonClickedSignIn()" class="header__button" />
    <app-button label="Register" (buttonClicked)="buttonClickedSignUp()" class="header__button" />
  </div>
</header>
