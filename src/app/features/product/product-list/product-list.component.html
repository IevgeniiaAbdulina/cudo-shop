<button (click)="goBack()">Go Back</button>
@if (currentRoute === '/books') {
  <ul>
    <li>book title</li>
  </ul>
}
@if (currentRoute === '/cosmetics') {
  <ul>
    <li>cosmetics title</li>
  </ul>
}

<div class="product-list">
  @for (product of products; track $index) {
    <app-brief-card
      [title]="helperService.getProductName(product)"
      [imgUrl]="helperService.getProductImg(product)"
      [description]="helperService.getShortProductDescription(product)"
    ></app-brief-card>
  }
</div>
