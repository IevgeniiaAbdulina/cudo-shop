<div class="card__img">
  <img src="{{ imgUrl }}" alt="product card image" />
</div>
<div class="card__info">
  <div class="card__title">{{ title }}</div>
  <div class="card__description">{{ description }}</div>
</div>
<app-product-price [product]="product"></app-product-price>
<app-product-button btnClass="product-button" text="Add to cart" [clickBtn]="buttonClickedAddToCart.bind(this)" />
