<div class="wrapper">
  <div class="content">
    <article class="content__hero">
      <app-button (buttonClicked)="selectCatalog('books')" class="category__button">
        <div class="category">
          <div class="category__image category__image-books"></div>
          <p class="category__name">books</p>
        </div>
      </app-button>
      <app-button (buttonClicked)="selectCatalog('cosmetics')" class="category__button">
        <div class="category">
          <p class="category__name">Cosmetics</p>
          <div class="category__image category__image-category"></div>
        </div>
      </app-button>
    </article>
    <article class="content__categories">
      <div class="content__categories-name">
        <h2>Books</h2>
      </div>
      <section>
        <app-product-list></app-product-list>
      </section>
    </article>
    <article class="content__categories">
      <div class="content__categories-name">
        <h2>Cosmetics</h2>
      </div>
      <section>
        <ul>
          <li>cosmetic</li>
        </ul>
      </section>
    </article>
  </div>
</div>
