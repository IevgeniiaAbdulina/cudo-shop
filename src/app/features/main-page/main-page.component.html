<app-header
  (buttonClickedLogIn)="goToLogInPage()"
  (buttonClickedRegister)="goToRegisterPage()"
  (buttonClickedLogOut)="userLoggedOut()"
  (buttonClickedCart)="goToCart()"
  (buttonClickedProfile)="navigateToRoute('/profile')"
  (buttonClickedGoToHome)="navigateToRoute('/main')"
  (buttonClickedBooks)="navigateToRoute('/books')"
  (buttonClickedCosmetics)="navigateToRoute('/cosmetics')"
/>

<main class="main">
  <app-breadcrumb></app-breadcrumb>
  <router-outlet [routerOutletData]="{ books: books(), cosmetics: cosmetics() }" />
</main>
<app-footer />
