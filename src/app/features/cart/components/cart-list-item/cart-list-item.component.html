<div class="cart__list__item">
  <div class="cart__list__item__image">
    <a routerLink="{{ '/books/' + cartItem()?.key }}">
      <img alt="product image" ngSrc="{{ cartItem()?.image }}" width="100" height="140" fetchpriority="auto" priority />
    </a>
  </div>

  <div class="cart__list__item__wrapper">
    <div class="cart__list__item__body">
      <div class="cart__list__item__name">
        <a routerLink="{{ '/books/' + cartItem()?.key }}">
          <h4>{{ cartItem()?.title }}</h4>
        </a>
      </div>

      <div class="cart__list__item__actions">
        <div class="counter__container">
          <app-button label="{{ count() === 1 ? '🗑' : '-' }}" (buttonClicked)="decrement(cartItem()?.key)"></app-button>
          <div class="counter__number">
            {{ count() }}
          </div>
          <app-button label="+" (buttonClicked)="increment()"></app-button>
        </div>
      </div>
    </div>

    <div class="cart__list__item__price">
      <div class="discount-value">30% off</div>
      <div>
        <span class="currency">EUR</span>
        <span class="discount">16.8</span>
      </div>
      <div class="old-price">24</div>
    </div>
  </div>
</div>
